{% load projects_extra %}
<div class="conversation-new__container-feed fr-p-3v flex-grow-1"
     id="conversation-new-container">
    {% if not topic_list %}
        {% regroup feed by topic as topic_list %}
    {% endif %}
    <!-- Shared contents header -->
    <template x-if="countOf.isLoaded && (countOf.tasks > 0 || countOf.documents > 0)">
        <div class="shared-contents-header fr-mb-2w fr-pb-2w" style="border-bottom: 1px solid var(--border-default-grey, #e5e5e5);">
            <button type="button"
                    class="fr-btn fr-btn--sm fr-btn--tertiary-no-outline"
                    @click="$store.sharedContentsPanel.open()">
                <span class="fr-icon fr-icon-file-text-line fr-icon--sm fr-mr-1v" aria-hidden="true"></span>
                <span x-text="`${countOf.tasks} recommandation${countOf.tasks > 1 ? 's' : ''}`" x-show="countOf.tasks > 0"></span>
                <span x-show="countOf.tasks > 0 && countOf.documents > 0"> / </span>
                <span x-text="`${countOf.documents} fichier${countOf.documents > 1 ? 's' : ''}`" x-show="countOf.documents > 0"></span>
            </button>
        </div>
    </template>
    <!-- Loop through all messages -->
    <div class="conversation-new__container-topic">
        <template x-for="(element, index) in feed.elements">
            <div>
                <!-- Date separator using simple Alpine.js approach -->
                <template x-if="shouldShowDate(element)">
                    <p class="conversation-new__date"
                       x-text="formatDateFrench(element.type == 'message' ? element.created : element.timestamp)"></p>
                </template>
                <template x-if="element.firstUnread">
                    <div class="notification-limit" x-ref="scrollLine_general">
                        <div class="notification-limit__line"></div>
                        <p class="notification-limit__message-number fr-mx-2w">
                            <span x-text='getCountOfNewItemsLabel()'></span>
                        </p>
                        <div class="notification-limit__line"></div>
                    </div>
                </template>
                <template x-if="element.type == 'message' && element.in_reply_to">
                    {% include "conversations/messages/message_item.html" with in_reply_to=True %}
                </template>
                <template x-if="element.type == 'message' && !element.in_reply_to">
                    {% include "conversations/messages/message_item.html" with in_reply_to=False %}
                </template>
                <template x-if="element.type == 'activity'">
                    {% include "conversations/messages/fragments/type_followup_item.html" with element="node" %}
                </template>
            </div>
        </template>
    </div>
</div>
<template x-if="feed.elements.length == 0">
    <div class="feed-element-item fr-px-3v fr-mb-3v">
        {% include "conversations/messages/fragments/empty_message_list.html" %}
    </div>
</template>

{% comment %}
Parameter Django:
    - node :
    {   'data':
            {
                'recommendation_id': 4242,
                'text': 'task text'
            },
        'position': 1,
        'type': 'recommendation'
    }
    - posted_by : user object
Parameter Alpine:
    - recommendation : recommendation object
{% endcomment %}
<template x-if="tasks.length > 0">
    <div x-data='{recommendation: null}'
         x-init="recommendation = getRecommendationById(node.recommendation_id)"
         class="task-item rounded-3 fr-my-2v">
        <template x-if="recommendation">
            <div class="position-relative">
                <div>
                    <template x-if="recommendation.resource">
                        <p class="rendered-markdown rendered-markdown--margin-lg"
                           x-html="renderMarkdown(recommendation.content)"></p>
                    </template>
                    {% include "conversations/messages/fragments/recommendation_card_content.html" %}
                </div>
            </div>
        </template>
    </div>
</template>
